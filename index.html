<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#171719" />
  <meta name="description" content="GOLD PICK 금거래소 추천·예상 견적·골드바 구매 웹앱 프로토타입" />
  <title>GOLD PICK</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="desktop-shell">
    <aside class="desktop-intro" aria-hidden="true">
      <div class="eyebrow">SMILE GOLD EXCHANGE</div>
      <h1>내 금, 얼마인지<br />알고 파세요.</h1>
      <p>시세 확인부터 예상 견적, 추천 매장, 공개 감정 예약과 골드바 구매까지 이어지는 금거래 플랫폼 프로토타입입니다.</p>
      <div class="intro-points">
        <div><span>01</span><b>투명 견적</b><small>계산 근거와 예상 범위 공개</small></div>
        <div><span>02</span><b>매장 추천</b><small>가격·거리·신뢰도를 종합 비교</small></div>
        <div><span>03</span><b>거래 연결</b><small>예약·감정·구매 내역을 한곳에</small></div>
      </div>
      <div class="demo-note">모바일 화면 기준으로 설계된 동작형 UX 시안</div>
    </aside>

    <main id="app" class="app-shell" aria-live="polite">
      <header class="app-header">
        <button class="brand" data-route="home" aria-label="홈으로 이동">
          <span class="brand-coin"><i></i></span>
          <span>GOLD PICK</span>
        </button>
        <div class="header-actions">
          <button class="icon-button" id="installButton" hidden aria-label="앱 설치">＋</button>
          <button class="icon-button" data-action="notifications" aria-label="알림 보기">
            <span class="bell-dot"></span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
          </button>
        </div>
      </header>

      <section id="page" class="page"></section>

      <nav class="bottom-nav" aria-label="주요 메뉴">
        <button data-route="home" class="nav-item active"><span data-icon="home"></span><b>오늘의 금</b></button>
        <button data-route="community" class="nav-item"><span data-icon="chat"></span><b>골드톡</b></button>
        <button data-route="stores" class="nav-item"><span data-icon="store"></span><b>금거래소</b></button>
        <button data-route="shop" class="nav-item"><span data-icon="coin"></span><b>골드샵</b></button>
        <button data-route="my" class="nav-item"><span data-icon="user"></span><b>MY</b></button>
      </nav>
    </main>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="assertive"></div>
  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
